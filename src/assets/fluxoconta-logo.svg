<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>FluxoConta logo</title>
  <desc>Logo FluxoConta — escudo com gráfico ascendente e wordmark</desc>
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1535c4"/>
      <stop offset="100%" stop-color="#0b1966"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f83ff"/>
      <stop offset="100%" stop-color="#2a55cc"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fa0ff"/>
      <stop offset="100%" stop-color="#3b6de0"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#96bfff"/>
      <stop offset="100%" stop-color="#5088f0"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdd5ff"/>
      <stop offset="100%" stop-color="#74a6ff"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="shieldMask">
      <path d="M100,6 L188,46 L188,138 Q188,216 100,248 Q12,216 12,138 L12,46 Z"/>
    </clipPath>
  </defs>

  <g transform="translate(240,20)">
    <ellipse cx="100" cy="140" rx="70" ry="80" fill="#1d44e8" opacity="0.22" filter="url(#softBlur)"/>
    <path d="M100,10 L190,50 L190,140 Q190,220 100,254 Q10,220 10,140 L10,50 Z" fill="#060e38" opacity="0.3" transform="translate(5,8)"/>
    <path d="M100,6 L188,46 L188,138 Q188,216 100,248 Q12,216 12,138 L12,46 Z" fill="url(#shieldGrad)"/>
    <path d="M100,14 L180,52 L180,138 Q180,210 100,240 Q20,210 20,138 L20,52 Z" fill="none" stroke="#3a64f8" stroke-width="1.2" opacity="0.7"/>
    <path d="M100,14 L180,52 L180,100 Q140,88 100,90 Q60,88 20,100 L20,52 Z" fill="url(#gloss)" clip-path="url(#shieldMask)"/>

    <line x1="38" y1="172" x2="162" y2="172" stroke="#ffffff" stroke-width="0.7" opacity="0.12"/>
    <line x1="38" y1="148" x2="162" y2="148" stroke="#ffffff" stroke-width="0.7" opacity="0.08"/>
    <line x1="38" y1="124" x2="162" y2="124" stroke="#ffffff" stroke-width="0.7" opacity="0.08"/>

    <rect x="42" y="148" width="22" height="24" rx="5" ry="5" fill="url(#bar1)"/>
    <rect x="70" y="128" width="22" height="44" rx="5" ry="5" fill="url(#bar2)"/>
    <rect x="98" y="104" width="22" height="68" rx="5" ry="5" fill="url(#bar3)"/>
    <rect x="126" y="80" width="22" height="92" rx="5" ry="5" fill="url(#bar4)"/>

    <rect x="42" y="148" width="22" height="7" rx="5" ry="5" fill="#ffffff" opacity="0.18"/>
    <rect x="70" y="128" width="22" height="7" rx="5" ry="5" fill="#ffffff" opacity="0.18"/>
    <rect x="98" y="104" width="22" height="7" rx="5" ry="5" fill="#ffffff" opacity="0.18"/>
    <rect x="126" y="80" width="22" height="7" rx="5" ry="5" fill="#ffffff" opacity="0.18"/>

    <polyline points="53,144 81,122 109,98 137,74" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="53" cy="144" r="4.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="81" cy="122" r="4.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="109" cy="98" r="4.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="137" cy="74" r="5.5" fill="#ffffff"/>
    <path d="M131,68 L143,68 L137,60 Z" fill="#ffffff"/>
    <line x1="100" y1="230" x2="100" y2="245" stroke="#3a64f8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <text x="340" y="354" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="50">
    <tspan fill="#0c1a52" font-weight="800">Fluxo</tspan><tspan fill="#1d44e8" font-weight="300">Conta</tspan>
  </text>
  <text x="340" y="385" text-anchor="middle" fill="#4a63b0" font-family="system-ui, -apple-system, sans-serif" font-size="12.5">ORÇAMENTOS SEGUROS</text>
  <rect x="283" y="400" width="114" height="2.5" rx="1.2" fill="#1d44e8" opacity="0.35"/>
</svg>
