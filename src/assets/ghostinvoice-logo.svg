<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">

  <!-- Subtle background glow behind ghost -->
  <ellipse cx="340" cy="140" rx="90" ry="100" fill="#1D9E75" opacity="0.05" style="fill:rgb(29, 158, 117);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.05;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Ghost shadow/base -->
